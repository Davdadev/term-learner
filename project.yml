name: TermLearner

options:
  bundleIdPrefix: com.termlearner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

targets:
  TermLearner:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TermLearner
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: TermLearner/Resources
    settings:
      base:
        INFOPLIST_FILE: TermLearner/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.termlearner.app
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          ENABLE_TESTABILITY: "YES"
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  TermLearner:
    build:
      targets:
        TermLearner: all
    run:
      config: Debug
      commandLineArguments: {}
      environmentVariables: {}
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
